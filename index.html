// ── FIREBASE — uses globals injected by <script type="module"> in <head> ──────
async function waitFb(timeout=6000) {
  if (window._fbReady) return true;
  return new Promise(res => {
    const t = setTimeout(()=>res(false), timeout);
    window.addEventListener("fbready", ()=>{ clearTimeout(t); res(true); }, {once:true});
  });
}
async function fbGet(coll, id) {
  if (!await waitFb()) return null;
  try {
    const s = await window._fbGetDoc(window._fbDoc(window._fbDb, coll, id));
    return s.exists() ? JSON.parse(s.data().data) : null;
  } catch(e) { console.warn("fbGet",e); return null; }
}
async function fbSet(coll, id, data) {
  if (!await waitFb()) return;
  try { await window._fbSetDoc(window._fbDoc(window._fbDb, coll, id), {data:JSON.stringify(data)}); }
  catch(e) { console.warn("fbSet",e); }
}
async function fbGetAll(coll) {
  if (!await waitFb()) return [];
  try {
    const s = await window._fbGetDocs(window._fbCollection(window._fbDb, coll));
    const r = [];
    s.forEach(d=>{ try { r.push({id:d.id,...JSON.parse(d.data().data)}); } catch(e){} });
    return r;
  } catch(e) { console.warn("fbGetAll",e); return []; }
}
async function fbDel(coll, id) {
  if (!await waitFb()) return;
  try { await window._fbDeleteDoc(window._fbDoc(window._fbDb, coll, id)); }
  catch(e) { console.warn("fbDel",e); }
}

// ── LOCALSTORAGE ─────────────────────────────────────────────────────────────
const LS = "udpr_v1_";
const lsGet = k => { try { const v=localStorage.getItem(LS+k); return v?JSON.parse(v):null; } catch{return null;} };
const lsSet = (k,v) => { try { localStorage.setItem(LS+k,JSON.stringify(v)); } catch{} };

// ── HELPERS ──────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];

function emptyDaily(segments, subActivities) {
  const d = {};
  (segments||[]).forEach(seg => {
    d[seg.id] = {};
    (subActivities||[]).forEach(sa => { d[seg.id][sa.key] = {done:[],ip:[],plan:[]}; });
  });
  return d;
}

function parseExcel(workbook) {
  const XLSX = window.XLSX;
  const segments = [], subActivities = [];
  const bgDone = {}, bgIp = {};
  workbook.SheetNames.forEach((sheetName, si) => {
    const ws = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws,{header:1});
    if (rows.length < 2) return;
    let hIdx = -1;
    for (let i=0;i<Math.min(5,rows.length);i++) {
      if (rows[i]&&rows[i][0]==="#"&&rows[i][1]==="Activity"){hIdx=i;break;}
    }
    if (hIdx===-1) return;
    const hdrs = rows[hIdx];
    const units = hdrs.slice(2).filter(Boolean).map(h=>({loc:String(h),type:"–"}));
    const segId = `seg_${si}`;
    segments.push({id:segId,name:sheetName,units});
    bgDone[segId]={}; bgIp[segId]={};
    for (let i=hIdx+1;i<rows.length;i++) {
      const row=rows[i];
      if (!row||!row[1]) continue;
      const actName=String(row[1]);
      if (actName==="TOTAL DONE →"||actName==="IN PROGRESS →") continue;
      let sa=subActivities.find(a=>a.name===actName);
      if (!sa) { sa={key:`act_${subActivities.length+1}`,name:actName}; subActivities.push(sa); }
      bgDone[segId][sa.key]=[]; bgIp[segId][sa.key]=[];
      for (let j=2;j<row.length;j++) {
        const cell=row[j], loc=hdrs[j];
        if (!loc) continue;
        if (cell==="✓") bgDone[segId][sa.key].push(String(loc));
        else if (cell==="▶") bgIp[segId][sa.key].push(String(loc));
      }
    }
  });
  return {segments,subActivities,bgDone,bgIp};
}

// ── IMPORT PANEL ──────────────────────────────────────────────────────────────
function ImportPanel({config,configKey,onDone}) {
  const [preview,setPreview]   = useState(null);
  const [loading,setLoading]   = useState(false);
  const fileRef                = useRef(null);

  function handleFile(e) {
    const file=e.target.files[0]; if (!file||!window.XLSX) return;
    setLoading(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const wb=window.XLSX.read(ev.target.result,{type:"array"});
        setPreview(parseExcel(wb));
      } catch(err){alert("Could not read file: "+err.message);}
      setLoading(false);
    };
    reader.readAsArrayBuffer(file);
  }

  async function confirm() {
    if (!preview) return;
    const newCfg={
      segments:preview.segments,
      subActivities:preview.subActivities,
      bgDone:preview.bgDone,
      bgIp:preview.bgIp,
    };
    lsSet("cfg_"+configKey,newCfg);
    await fbSet("activity_config",configKey,newCfg);
    onDone(newCfg);
  }

  return (
    <div style={{padding:24,maxWidth:580,margin:"0 auto"}}>
      <div style={{background:C.card,borderRadius:12,padding:28,border:`1px solid ${C.border}`,marginTop:10}}>
        <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:8}}>📂 Import Excel</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:20}}>
          Excel format: each <b>sheet = segment</b> (Item 1, Item 2…). Row 2 = headers (<code>#, Activity, tower1, tower2…</code>). Rows 3+ = activities.
          {config&&<span style={{color:"#cc2222",display:"block",marginTop:6}}>⚠ Re-importing will reset all data for this activity.</span>}
        </div>
        <input type="file" ref={fileRef} accept=".xlsx,.xls" onChange={handleFile} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current.click()}
          style={{background:C.amber,color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",cursor:"pointer",fontWeight:700,fontSize:14}}>
          📂 Choose Excel File
        </button>
        {loading&&<div style={{marginTop:12,color:C.muted,fontSize:13}}>Parsing…</div>}
        {preview&&(
          <div style={{marginTop:20,background:"#f8f9fc",borderRadius:10,padding:18,border:`1px solid ${C.border}`}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:10}}>Preview</div>
            {preview.segments.map(s=>(
              <div key={s.id} style={{fontSize:12,marginBottom:5}}>
                <b>{s.name}</b> — {s.units.length} towers
              </div>
            ))}
            <div style={{fontSize:12,color:C.muted,margin:"10px 0 4px"}}>{preview.subActivities.length} sub-activities:</div>
            {preview.subActivities.map(sa=>(
              <div key={sa.key} style={{fontSize:11,color:C.text,marginBottom:2}}>• {sa.name}</div>
            ))}
            <button onClick={confirm}
              style={{marginTop:16,width:"100%",background:C.green,color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:700,fontSize:14}}>
              ✅ Confirm &amp; Load
            </button>
          </div>
        )}
        {config&&(
          <div style={{marginTop:24,borderTop:`1px solid ${C.border}`,paddingTop:20}}>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8}}>CURRENT CONFIG</div>
            {config.segments.map(s=>(
              <div key={s.id} style={{fontSize:12,color:C.text,marginBottom:4}}>
                <b>{s.name}</b>: {s.units.length} towers
              </div>
            ))}
            <div style={{fontSize:11,color:C.muted,marginTop:6}}>
              Activities: {config.subActivities.map(sa=>sa.name).join(", ")}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── DPR SCREEN ────────────────────────────────────────────────────────────────
function DPRScreen({project,mainActivity,onBack,fbStatus,setFbStatus}) {
  const [config,setConfig]       = useState(null);
  const [daily,setDaily]         = useState(null);
  const [cum,setCum]             = useState(null);
  const [seg,setSeg]             = useState(null); // selected segment id
  const [mainTab,setMainTab]     = useState("dpr");
  const [date,setDate]           = useState(todayStr());
  const [weather,setWeather]     = useState("Sunny");
  const [temp,setTemp]           = useState("32°C / 46°C");
  const [inputs,setInputs]       = useState({});
  const [errors,setErrors]       = useState({});
  const [toast,setToast]         = useState("");
  const [remarks,setRemarks]     = useState({});
  const [remarkOpen,setRemarkOpen] = useState(null);
  const [remarkDraft,setRemarkDraft] = useState("");
  const [prevPlan,setPrevPlan]   = useState(null);
  const refs = useRef({});

  const cfgKey   = `${project.id}_${mainActivity.id}`;
  const dailyKey = `${cfgKey}_${date}`;

  // ── load config ──
  useEffect(()=>{
    async function load() {
      let cfg = await fbGet("activity_config",cfgKey);
      if (!cfg) cfg = lsGet("cfg_"+cfgKey);
      if (cfg) { setConfig(cfg); setSeg(cfg.segments[0]?.id||null); }
    }
    load();
  },[cfgKey]);

  // ── load daily + cum + remarks ──
  useEffect(()=>{
    if (!config) return;
    setDaily(null); setCum(null);
    async function load() {
      // Build cumulative from stored + bg seed
      let storedCum = await fbGet("dpr_cumulative",cfgKey);
      if (!storedCum) storedCum = lsGet("cum_"+cfgKey);
      const builtCum = buildCum(config, storedCum);
      setCum(builtCum);

      // Today's daily
      let tod = await fbGet("dpr_daily",dailyKey);
      if (!tod) tod = lsGet("daily_"+dailyKey);
      if (!tod) tod = emptyDaily(config.segments,config.subActivities);
      ensureKeys(tod, config);
      setFbStatus("synced");
      setDaily(tod);

      // Remarks
      let rem = await fbGet("dpr_remarks",dailyKey);
      if (!rem) rem = lsGet("rem_"+dailyKey)||{};
      setRemarks(rem);

      // Yesterday's plan
      const yDate = new Date(date);
      yDate.setDate(yDate.getDate()-1);
      const yKey = `${cfgKey}_${yDate.toISOString().split("T")[0]}`;
      const yData = await fbGet("dpr_daily",yKey) || lsGet("daily_"+yKey);
      if (yData) {
        const pp={};
        config.segments.forEach(s=>{
          pp[s.id]={};
          config.subActivities.forEach(sa=>{ pp[s.id][sa.key]=yData[s.id]?.[sa.key]?.plan||[]; });
        });
        setPrevPlan(pp);
      } else setPrevPlan(null);
    }
    load();
  },[config,date]);

  function buildCum(cfg, stored) {
    const c={};
    cfg.segments.forEach(s=>{
      c[s.id]={};
      cfg.subActivities.forEach(sa=>{
        const bgD=cfg.bgDone?.[s.id]?.[sa.key]||[];
        const bgI=cfg.bgIp?.[s.id]?.[sa.key]||[];
        const stD=stored?.[s.id]?.[sa.key]?.done||[];
        const stI=stored?.[s.id]?.[sa.key]?.ip||[];
        const doneSet=new Set([...bgD,...stD]);
        const ipSet=new Set([...bgI,...stI].filter(t=>!doneSet.has(t)));
        c[s.id][sa.key]={done:[...doneSet],ip:[...ipSet],plan:[]};
      });
    });
    return c;
  }

  function ensureKeys(d, cfg) {
    cfg.segments.forEach(s=>{
      if (!d[s.id]) d[s.id]={};
      cfg.subActivities.forEach(sa=>{
        if (!d[s.id][sa.key]) d[s.id][sa.key]={done:[],ip:[],plan:[]};
        if (!d[s.id][sa.key].plan) d[s.id][sa.key].plan=[];
      });
    });
  }

  function mergeCum(base, tod) {
    const n=JSON.parse(JSON.stringify(base));
    config.segments.forEach(s=>{
      config.subActivities.forEach(sa=>{
        if (!n[s.id]) n[s.id]={};
        if (!n[s.id][sa.key]) n[s.id][sa.key]={done:[],ip:[],plan:[]};
        const td=tod[s.id]?.[sa.key]; if (!td) return;
        const dSet=new Set(n[s.id][sa.key].done);
        td.done.forEach(t=>dSet.add(t));
        const iSet=new Set(n[s.id][sa.key].ip);
        td.done.forEach(t=>iSet.delete(t));
        td.ip.forEach(t=>{if(!dSet.has(t))iSet.add(t);});
        n[s.id][sa.key].done=[...dSet]; n[s.id][sa.key].ip=[...iSet];
      });
    });
    return n;
  }

  function persist(nd) {
    setDaily(nd);
    lsSet("daily_"+dailyKey,nd);
    fbSet("dpr_daily",dailyKey,nd);
    setCum(prev=>{
      const base=prev||buildCum(config,null);
      const nc=mergeCum(base,nd);
      lsSet("cum_"+cfgKey,nc);
      fbSet("dpr_cumulative",cfgKey,nc);
      return nc;
    });
  }

  function persistRemarks(n) {
    setRemarks(n);
    lsSet("rem_"+dailyKey,n);
    fbSet("dpr_remarks",dailyKey,n);
  }

  const flash = msg => { setToast(msg); setTimeout(()=>setToast(""),2200); };

  const getUnits = sid => config?.segments.find(s=>s.id===sid)?.units.map(u=>u.loc)||[];

  function cntDone(sid,sak) {
    if (!cum||!daily) return 0;
    return new Set([...(cum[sid]?.[sak]?.done||[]),...(daily[sid]?.[sak]?.done||[])]).size;
  }
  function cntIp(sid,sak) {
    if (!cum||!daily) return 0;
    return new Set([...(cum[sid]?.[sak]?.ip||[]),...(daily[sid]?.[sak]?.ip||[])]).size;
  }

  function todayChips(sid,sak) {
    if (!daily) return [];
    const d=daily[sid]?.[sak]; if (!d) return [];
    return [...new Set([...d.done,...d.ip])].sort((a,b)=>getUnits(sid).indexOf(a)-getUnits(sid).indexOf(b));
  }
  function planChips(sid,sak) {
    if (!daily) return [];
    return [...(daily[sid]?.[sak]?.plan||[])].sort((a,b)=>getUnits(sid).indexOf(a)-getUnits(sid).indexOf(b));
  }
  function chipStatus(sid,sak,loc,mode="dpr") {
    if (!daily) return null;
    const d=daily[sid]?.[sak]; if (!d) return null;
    if (mode==="plan") return d.plan.includes(loc)?PLAN:null;
    if (d.done.includes(loc)) return DONE;
    if (d.ip.includes(loc)) return IP;
    return null;
  }

  function toggle(sid,sak,loc,mode="dpr") {
    const d=daily[sid]?.[sak]; if (!d) return;
    if (mode==="plan") {
      const np=d.plan.includes(loc)?d.plan.filter(x=>x!==loc):[...d.plan,loc];
      persist({...daily,[sid]:{...daily[sid],[sak]:{...d,plan:np}}}); return;
    }
    let nd=[...d.done],ni=[...d.ip];
    if (d.done.includes(loc))  { nd=nd.filter(x=>x!==loc); ni.push(loc); }
    else if (d.ip.includes(loc)){ ni=ni.filter(x=>x!==loc); nd.push(loc); }
    else                        { nd.push(loc); }
    persist({...daily,[sid]:{...daily[sid],[sak]:{...d,done:nd,ip:ni}}});
  }

  function remove(sid,sak,loc,mode="dpr") {
    const d=daily[sid]?.[sak]; if (!d) return;
    if (mode==="plan") {
      persist({...daily,[sid]:{...daily[sid],[sak]:{...d,plan:d.plan.filter(x=>x!==loc)}}}); return;
    }
    persist({...daily,[sid]:{...daily[sid],[sak]:{...d,done:d.done.filter(x=>x!==loc),ip:d.ip.filter(x=>x!==loc)}}});
  }

  function addChips(sid,sak,startAs,mode="dpr",directLoc=null) {
    const raw=directLoc||(inputs[`${sid}_${sak}`]||"").trim();
    if (!raw) return;
    const tokens=raw.split(/[,\s;]+/).map(s=>s.trim()).filter(Boolean);
    const vs=new Set(getUnits(sid));
    const valid=tokens.filter(t=>vs.has(t));
    const invalid=tokens.filter(t=>!vs.has(t));
    if (invalid.length) {
      setErrors(e=>({...e,[`${sid}_${sak}`]:`Not found: ${invalid.join(", ")}`}));
      setTimeout(()=>setErrors(e=>{const n={...e};delete n[`${sid}_${sak}`];return n;}),3500);
    }
    if (!valid.length) return;
    const d=daily[sid]?.[sak]||{done:[],ip:[],plan:[]};
    if (mode==="plan") {
      const ex=new Set(d.plan);
      const toAdd=valid.filter(t=>!ex.has(t));
      if (!toAdd.length){flash("Already in plan");return;}
      persist({...daily,[sid]:{...daily[sid],[sak]:{...d,plan:[...d.plan,...toAdd]}}});
      setInputs(q=>({...q,[`${sid}_${sak}`]:""}));
      flash(`${toAdd.length} added to plan`);
      refs.current[`${sid}_${sak}`]?.focus(); return;
    }
    const ex=new Set([...d.done,...d.ip]);
    const toAdd=valid.filter(t=>!ex.has(t));
    if (!toAdd.length){flash("Already added");return;}
    persist({...daily,[sid]:{...daily[sid],[sak]:{
      ...d,
      done:startAs===DONE?[...d.done,...toAdd]:[...d.done],
      ip:  startAs===IP  ?[...d.ip,...toAdd]  :[...d.ip],
    }}});
    setInputs(q=>({...q,[`${sid}_${sak}`]:""}));
    flash(`${toAdd.length} tower${toAdd.length>1?"s":""} added`);
    refs.current[`${sid}_${sak}`]?.focus();
  }

  function downloadExcel() {
    if (!daily||!cum||!config||!window.XLSX){flash("Not ready");return;}
    const XLSX=window.XLSX, wb=XLSX.utils.book_new();
    config.segments.forEach(s=>{
      const units=s.units.map(u=>u.loc);
      const rows=config.subActivities.map((sa,i)=>{
        const cD=new Set([...(cum[s.id]?.[sa.key]?.done||[]),...(daily[s.id]?.[sa.key]?.done||[])]);
        const cI=new Set([...(cum[s.id]?.[sa.key]?.ip||[]),...(daily[s.id]?.[sa.key]?.ip||[])].filter(t=>!cD.has(t)));
        return [i+1,sa.name,...units.map(t=>cD.has(t)?"✓":cI.has(t)?"▶":"")];
      });
      const totRow=["","TOTAL DONE →",...units.map((_,ci)=>rows.reduce((s,r)=>s+(r[ci+2]==="✓"?1:0),0))];
      const ipRow =["","IN PROGRESS →",...units.map((_,ci)=>rows.reduce((s,r)=>s+(r[ci+2]==="▶"?1:0),0))];
      const aoa=[[`${project.name} | ${mainActivity.name} | ${s.name} | As on ${date}`],["#","Activity",...units],...rows,totRow,ipRow];
      const ws=XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"]=[{wch:4},{wch:30},...units.map(()=>({wch:7}))];
      XLSX.utils.book_append_sheet(wb,ws,s.name.slice(0,31));
    });
    const out=XLSX.write(wb,{bookType:"xlsx",type:"array"});
    const url=URL.createObjectURL(new Blob([out],{type:"application/octet-stream"}));
    Object.assign(document.createElement("a"),{href:url,download:`DPR-${project.name}-${mainActivity.name}-${date}.xlsx`}).click();
    URL.revokeObjectURL(url);
    flash("📥 Excel downloaded!");
  }

  // ── No config → show import ──
  if (!config) return (
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={{background:C.amber,padding:"10px 18px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#000",fontSize:22,cursor:"pointer",padding:0}}>←</button>
        <div>
          <div style={{fontFamily:MONO,fontWeight:700,fontSize:14}}>{project.name} · {mainActivity.name}</div>
          <div style={{fontSize:10,color:"#444"}}>Configure this activity to begin</div>
        </div>
      </div>
      <ImportPanel config={null} configKey={cfgKey} onDone={cfg=>{setConfig(cfg);setSeg(cfg.segments[0]?.id||null);flash("✅ Loaded!");setMainTab("dpr");}}/>
    </div>
  );

  if (!daily||!cum) return (
    <div style={{background:C.bg,height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{color:C.amber,fontFamily:MONO,fontSize:16,fontWeight:700}}>Loading {date}…</div>
    </div>
  );

  const curSeg=config.segments.find(s=>s.id===seg);

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Segoe UI',system-ui,sans-serif",color:C.text}}>
      {toast&&(
        <div style={{position:"fixed",top:14,right:14,background:C.amber,color:"#fff",
          padding:"9px 16px",borderRadius:8,fontWeight:700,fontSize:12,zIndex:999}}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{background:C.amber,padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:"#000",fontSize:22,cursor:"pointer",padding:0}}>←</button>
          <div>
            <div style={{fontFamily:MONO,fontWeight:700,fontSize:14,color:"#000"}}>{project.name} · {mainActivity.name}</div>
            <div style={{fontSize:10,color:"#444",display:"flex",gap:6,alignItems:"center"}}>
              {project.description||"DPR"} <FbBadge status={fbStatus}/>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            style={{background:"#fff",border:"1px solid #ddd",color:"#333",fontFamily:MONO,fontSize:12,padding:"5px 8px",borderRadius:5}}/>
          <select value={weather} onChange={e=>setWeather(e.target.value)}
            style={{background:"#fff",border:"1px solid #ddd",color:C.text,fontSize:12,padding:"5px 8px",borderRadius:5}}>
            {["Sunny","Partly Cloudy","Cloudy","Windy","Sandstorm"].map(w=><option key={w}>{w}</option>)}
          </select>
          <input value={temp} onChange={e=>setTemp(e.target.value)}

          <button onClick={downloadExcel}
            style={{background:"#1a3a5c",color:"#fff",border:"none",borderRadius:5,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>

          </button>
        </div>
      </div>

      {/* Legend */}
      <div style={{background:"#eef0f7",padding:"7px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:10,color:"#6070a0",fontWeight:700}}>CHIP:</span>
        <span style={{background:"#fff8ec",color:"#b06000",border:"1.5px solid #e09030",borderRadius:5,padding:"2px 8px",fontSize:11,fontFamily:MONO,fontWeight:700}}>▶ IP</span>
        <span style={{background:"#eafaf0",color:"#1a7a35",border:"1.5px solid #3fb950",borderRadius:5,padding:"2px 8px",fontSize:11,fontFamily:MONO,fontWeight:700}}>✓ Done</span>
        <span style={{fontSize:10,color:C.muted}}>· tap to toggle · ✕ remove · pre-seeded in Excel only</span>
      </div>

      {/* Main Tabs */}
      <div style={{display:"flex",background:"#eef0f7",borderBottom:`1px solid ${C.border}`}}>
        {[["dpr","📋 DPR"],["plan","📅 Plan"],["import","📂 Import"],["admin","🔧 Admin"]].map(([key,lbl])=>(
          <button key={key} onClick={()=>setMainTab(key)}
            style={{padding:"10px 18px",background:"none",border:"none",cursor:"pointer",
              fontSize:13,fontWeight:mainTab===key?700:400,color:mainTab===key?C.amber:"#6070a0",
              borderBottom:mainTab===key?`2px solid ${C.amber}`:"2px solid transparent",marginBottom:-1}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* Segment Sub-Tabs */}
      {(mainTab==="dpr"||mainTab==="plan")&&(
        <div style={{display:"flex",background:C.card,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
          {config.segments.map(s=>(
            <button key={s.id} onClick={()=>setSeg(s.id)}
              style={{padding:"9px 16px",background:"none",border:"none",cursor:"pointer",whiteSpace:"nowrap",
                fontSize:13,fontWeight:seg===s.id?700:400,color:seg===s.id?C.amber:"#6070a0",
                borderBottom:seg===s.id?`2px solid ${C.amber}`:"2px solid transparent",marginBottom:-1}}>
              {s.name} <span style={{fontSize:10,color:C.muted}}>({s.units.length})</span>
            </button>
          ))}
        </div>

      {/* ── DPR Tab ── */}
      {mainTab==="dpr"&&seg&&config.subActivities.map((sa,ai)=>{
        const total=getUnits(seg).length;
        const done=cntDone(seg,sa.key);
        const ip=cntIp(seg,sa.key);
        const pct=total?(done/total*100).toFixed(1):"0.0";
        const ik=`${seg}_${sa.key}`;
        const chips=todayChips(seg,sa.key);
        return (
          <div key={sa.key} style={{borderBottom:`1px solid ${C.border}`,background:ai%2===0?C.card:"#f8f9fc"}}>
            <div style={{padding:"12px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <span style={{fontSize:13,fontWeight:700}}>{sa.name}</span>
                    <button onClick={()=>{setRemarkOpen(ik);setRemarkDraft(remarks[ik]||"");}}
                      style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:"0 2px",opacity:remarks[ik]?1:0.3}}>💬</button>
                  </div>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    <span style={{fontSize:11,color:C.green}}>✓ {done} done</span>
                    {ip>0&&<span style={{fontSize:11,color:C.yellow}}>▶ {ip} in progress</span>}
                    <span style={{fontSize:11,color:C.muted}}>{total-done-ip} remaining</span>
                    <span style={{fontSize:12,fontWeight:700,color:pct>=90?C.green:pct>=50?C.amber:C.muted}}>{pct}%</span>
                  </div>
                </div>
                <div style={{width:140,background:"#e0e4ee",borderRadius:4,height:7,overflow:"hidden",display:"flex",alignSelf:"center"}}>
                  <div style={{width:`${done/total*100}%`,background:pct>=90?C.green:pct>=50?C.amber:C.navy,transition:"width .3s"}}/>
                  <div style={{width:`${ip/total*100}%`,background:C.yellow,transition:"width .3s"}}/>
                </div>
              </div>

              {/* Yesterday's plan */}
              {prevPlan&&(()=>{
                const yp=(prevPlan[seg]?.[sa.key]||[]).filter(loc=>{
                  const cumDone=cum[seg]?.[sa.key]?.done||[];
                  return !cumDone.includes(loc)&&!daily[seg]?.[sa.key]?.done?.includes(loc)&&!daily[seg]?.[sa.key]?.ip?.includes(loc);
                });
                if (!yp.length) return null;
                return (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:10,color:"#1a5ab0",fontWeight:700,letterSpacing:1,marginBottom:5}}>📅 FROM YESTERDAY'S PLAN:</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {yp.map(loc=>(
                        <div key={loc} style={{display:"inline-flex",gap:3}}>
                          <button onClick={()=>addChips(seg,sa.key,IP,"dpr",loc)}
                            style={{background:"#2e2200",color:"#f0c040",border:"1.5px solid #6b4f00",borderRadius:"6px 0 0 6px",padding:"5px 9px",cursor:"pointer",fontFamily:MONO,fontSize:11,fontWeight:700}}>
                            ▶ {loc}
                          </button>
                          <button onClick={()=>addChips(seg,sa.key,DONE,"dpr",loc)}
                            style={{background:"#0a2410",color:"#3fb950",border:"1.5px solid #155a25",borderRadius:"0 6px 6px 0",padding:"5px 7px",cursor:"pointer",fontFamily:MONO,fontSize:11,fontWeight:700,borderLeft:"none"}}>
                            ✓
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}

              <div style={{display:"flex",gap:6,marginBottom:chips.length?10:0}}>
                <input ref={el=>refs.current[ik]=el}
                  value={inputs[ik]||""} onChange={e=>setInputs(q=>({...q,[ik]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&addChips(seg,sa.key,IP)}
                  placeholder="Type tower no. e.g. 7/5"
                  style={{flex:1,background:"#181818",border:`1px solid ${errors[ik]?"#f85149":C.border}`,
                    color:"#eee",fontFamily:MONO,fontSize:12,padding:"7px 10px",borderRadius:6,outline:"none"}}/>
                <button onClick={()=>addChips(seg,sa.key,IP)}
                  style={{background:"#2e2200",color:C.yellow,border:"1px solid #6b4f00",borderRadius:6,padding:"7px 13px",cursor:"pointer",fontWeight:700,fontSize:12}}>
                  ▶ Add
                </button>
                <button onClick={()=>addChips(seg,sa.key,DONE)}
                  style={{background:"#0a2410",color:C.green,border:"1px solid #155a25",borderRadius:6,padding:"7px 13px",cursor:"pointer",fontWeight:700,fontSize:12}}>
                  ✓ Done
                </button>
              </div>

              {errors[ik]&&<div style={{color:"#f85149",fontSize:10,marginBottom:6,fontFamily:MONO}}>{errors[ik]}</div>}

              {/* Status hint */}
              {(()=>{
                const raw=(inputs[ik]||"").trim();
                if (!raw||errors[ik]) return null;
                const tokens=raw.split(/[,\s;]+/).map(s=>s.trim()).filter(Boolean);
                const vs=new Set(getUnits(seg));
                const hints=tokens.map(t=>{
                  if (!vs.has(t)) return null;
                  const cD=(cum[seg]?.[sa.key]?.done||[]).includes(t);
                  const dD=daily[seg]?.[sa.key]?.done?.includes(t);
                  const dI=daily[seg]?.[sa.key]?.ip?.includes(t);
                  if (cD||dD) return {t,label:"✓ Done",color:"#1a7a35",bg:"#eafaf0",bdr:"#3fb950",canDel:dD&&!cD};
                  if (dI)     return {t,label:"▶ In Progress",color:"#b06000",bg:"#fff8ec",bdr:"#e09030",canDel:true};
                  return        {t,label:"○ Yet to Start",color:"#9098b0",bg:"#f5f6fa",bdr:"#c8d0e0",canDel:false};
                }).filter(Boolean);
                if (!hints.length) return null;
                return (
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8,marginTop:-4}}>
                    {hints.map(h=>(
                      <span key={h.t} style={{background:h.bg,color:h.color,border:`1px solid ${h.bdr}`,
                        borderRadius:5,padding:"3px 9px",fontSize:11,fontFamily:MONO,fontWeight:700,display:"inline-flex",alignItems:"center",gap:7}}>
                        {h.t} — {h.label}
                        {h.canDel&&<button onClick={()=>remove(seg,sa.key,h.t)} style={{background:"#fff0f0",color:"#cc2222",border:"1px solid #ffaaaa",borderRadius:4,padding:"1px 6px",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:MONO,lineHeight:1.4}}>✕ Del</button>}
                        {!h.canDel&&h.label==="✓ Done"&&<span style={{fontSize:9,color:"#555",fontWeight:400}}>(seeded)</span>}
                      </span>
                    ))}
                  </div>
                );
              })()}

              {chips.length>0&&(
                <div style={{display:"flex",flexWrap:"wrap",marginTop:2}}>
                  {chips.map(loc=>(
                    <Chip key={loc} loc={loc} status={chipStatus(seg,sa.key,loc)}
                      onToggle={()=>toggle(seg,sa.key,loc)}
                      onRemove={()=>remove(seg,sa.key,loc)}/>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      })}

      {/* ── Plan Tab ── */}
      {mainTab==="plan"&&seg&&config.subActivities.map((sa,ai)=>{
        const pc=planChips(seg,sa.key);
        const ik=`${seg}_${sa.key}`;
        return (
          <div key={sa.key} style={{borderBottom:`1px solid ${C.border}`,background:ai%2===0?C.card:"#f8f9fc"}}>
            <div style={{padding:"12px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700}}>{sa.name}</div>
                <span style={{fontSize:11,color:"#7eb8f7"}}>📅 {pc.length} planned</span>
              </div>
              {(()=>{
                const todIp=(daily[seg]?.[sa.key]?.ip||[]).filter(l=>!pc.includes(l));
                if (!todIp.length) return null;
                return (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:10,color:"#b06000",fontWeight:700,letterSpacing:1,marginBottom:5}}>▶ IN PROGRESS — TAP TO ADD:</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {todIp.map(loc=>(
                        <button key={loc} onClick={()=>addChips(seg,sa.key,PLAN,"plan",loc)}
                          style={{background:"#fff8ec",color:"#b06000",border:"1.5px solid #e09030",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontFamily:MONO,fontSize:11,fontWeight:700}}>
                          ▶ {loc}
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })()}
              <div style={{display:"flex",gap:6,marginBottom:pc.length?10:0}}>
                <input ref={el=>refs.current[ik]=el}
                  value={inputs[ik]||""} onChange={e=>setInputs(q=>({...q,[ik]:e.target.value}))}
                  onKeyDown={e=>{if(e.key==="Enter")addChips(seg,sa.key,PLAN,"plan");}}
                  placeholder="Tower nos e.g. 7/5, 7/6"
                  style={{flex:1,background:"#181818",border:`1px solid ${C.border}`,color:"#eee",fontFamily:MONO,fontSize:12,padding:"7px 10px",borderRadius:6,outline:"none"}}/>
                <button onClick={()=>addChips(seg,sa.key,PLAN,"plan")}
                  style={{background:"#eaf2ff",color:"#1a5ab0",border:"1px solid #6090d0",borderRadius:6,padding:"7px 13px",cursor:"pointer",fontWeight:700,fontSize:12}}>
                  + Plan
                </button>
              </div>
              {pc.length>0&&(
                <div style={{display:"flex",flexWrap:"wrap",marginTop:2}}>
                  {pc.map(loc=>(
                    <div key={loc} style={{position:"relative",display:"inline-flex",margin:"3px"}}>
                      <span style={{background:"#eaf2ff",color:"#1a5ab0",border:"1.5px solid #6090d0",borderRadius:7,padding:"6px 10px",fontFamily:MONO,fontSize:12,fontWeight:700}}>📅 {loc}</span>
                      <button onClick={()=>remove(seg,sa.key,loc,"plan")} style={{position:"absolute",top:-6,right:-6,width:16,height:16,borderRadius:"50%",background:"#e8eaf0",border:"1px solid #c0c8d8",color:"#777",fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,lineHeight:1}}>✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      })}

      {/* ── Import Tab ── */}
      {mainTab==="import"&&(
        <ImportPanel config={config} configKey={cfgKey} onDone={cfg=>{
          setConfig(cfg); setSeg(cfg.segments[0]?.id||null);
          setDaily(emptyDaily(cfg.segments,cfg.subActivities));
          setCum(buildCum(cfg,null));
          flash("✅ Re-imported!"); setMainTab("dpr");
        }}/>

      {/* ── Admin Tab ── */}
      {mainTab==="admin"&&(
        <div style={{padding:20,maxWidth:560,margin:"0 auto"}}>
          <AdminSubActivities config={config} configKey={cfgKey} onConfigUpdate={cfg=>{setConfig(cfg);flash("✅ Saved");}}/>
        </div>

      <div style={{height:40}}/>

      {/* Remarks Modal */}
      {remarkOpen&&(
        <div onClick={e=>{if(e.target===e.currentTarget)setRemarkOpen(null);}}

          <div style={{background:C.card,width:"100%",borderRadius:"14px 14px 0 0",padding:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <b style={{fontSize:15,color:C.text}}>💬 Remarks</b>
              <button onClick={()=>setRemarkOpen(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.muted}}>✕</button>
            </div>
            <div style={{fontSize:11,color:C.muted,marginBottom:10}}>
              {config.subActivities.find(sa=>`${seg}_${sa.key}`===remarkOpen)?.name} · {curSeg?.name}
            </div>
            <textarea value={remarkDraft} onChange={e=>setRemarkDraft(e.target.value)}
              placeholder="Type remarks here..." rows={4} autoFocus
              style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:13,color:C.text,resize:"none",outline:"none",background:"#f8f9fc",fontFamily:"'Segoe UI',system-ui,sans-serif"}}/>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button onClick={()=>{
                const n={...remarks};
                if(remarkDraft.trim())n[remarkOpen]=remarkDraft.trim();else delete n[remarkOpen];
                persistRemarks(n);setRemarkOpen(null);
              }} style={{flex:1,background:C.amber,color:"#fff",border:"none",borderRadius:8,padding:10,cursor:"pointer",fontWeight:700,fontSize:14}}>Save</button>
              {remarks[remarkOpen]&&(
                <button onClick={()=>{const n={...remarks};delete n[remarkOpen];persistRemarks(n);setRemarkOpen(null);}}
                  style={{background:"#fff0f0",color:"#cc2222",border:"1px solid #ffaaaa",borderRadius:8,padding:"10px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>Clear</button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── PROJECT SCREEN ────────────────────────────────────────────────────────────
function ProjectScreen({project,onBack,onOpenActivity,fbStatus}) {
  const [activities,setActivities] = useState(project.mainActivities||[]);
  const [showAdd,setShowAdd]       = useState(false);
  const [newName,setNewName]       = useState("");
  const [configs,setConfigs]       = useState({});

  useEffect(()=>{
    async function load() {
      const cfgs={};
      for (const act of activities) {
        const key=`${project.id}_${act.id}`;
        let cfg=await fbGet("activity_config",key);
        if (!cfg) cfg=lsGet("cfg_"+key);
        if (cfg) cfgs[act.id]=cfg;
      }
      setConfigs(cfgs);
    }
    load();
  },[activities]);

  async function addAct() {
    if (!newName.trim()) return;
    const act={id:`act_${Date.now()}`,name:newName.trim()};
    const upd=[...activities,act];
    setActivities(upd);
    const uProj={...project,mainActivities:upd};
    lsSet("project_"+project.id,uProj);
    await fbSet("projects",project.id,uProj);
    setNewName(""); setShowAdd(false);
  }

  async function delAct(id,name) {
    if (!window.confirm(`Remove "${name}"?`)) return;
    const upd=activities.filter(a=>a.id!==id);
    setActivities(upd);
    const uProj={...project,mainActivities:upd};
    lsSet("project_"+project.id,uProj);
    await fbSet("projects",project.id,uProj);
  }

  const ICONS = {"Foundation":"🏗","Erection":"🏗","Stringing":"⚡"};
  const COLORS = ["#1a3a5c","#1a7a35","#7a1a35","#5a2a8a","#8a5a1a","#2a7a7a"];

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Segoe UI',system-ui,sans-serif",color:C.text}}>
      <div style={{background:C.navy,padding:"14px 18px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",fontSize:22,cursor:"pointer",padding:0}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:17,color:"#fff"}}>{project.name}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.55)"}}>{project.description||"Project"}</div>
        </div>
        <FbBadge status={fbStatus}/>
      </div>

      <div style={{padding:"20px 16px",maxWidth:700,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:C.muted,letterSpacing:1}}>MAIN ACTIVITIES</div>
          <button onClick={()=>setShowAdd(true)}
            style={{background:C.amber,color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:700,fontSize:13}}>
            + Add Activity
          </button>
        </div>

        {activities.length===0&&(
          <div style={{textAlign:"center",padding:"50px 20px",color:C.muted}}>
            <div style={{fontSize:40,marginBottom:12}}>📋</div>
            <div style={{fontSize:14,marginBottom:6}}>No activities yet</div>
            <div style={{fontSize:12}}>Add Foundation, Erection, Stringing or any custom activity</div>
          </div>
        )}

        {activities.map((act,i)=>{
          const cfg=configs[act.id];
          const col=COLORS[i%COLORS.length];
          const icon=ICONS[act.name]||"📋";
          const totalTowers=cfg?cfg.segments.reduce((s,sg)=>s+sg.units.length,0):null;
          return (
            <div key={act.id} onClick={()=>onOpenActivity(act)}
              style={{background:C.card,borderRadius:12,padding:20,marginBottom:12,border:`1px solid ${C.border}`,
                cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",transition:"all .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 6px 20px rgba(0,0,0,0.1)";e.currentTarget.style.transform="translateY(-1px)";}}
              onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.06)";e.currentTarget.style.transform="translateY(0)";}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <div style={{width:46,height:46,borderRadius:12,background:col,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
                    {icon}
                  </div>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:C.text}}>{act.name}</div>
                    {cfg?(
                      <div style={{fontSize:11,color:C.muted,marginTop:3}}>
                        {cfg.segments.length} segment{cfg.segments.length!==1?"s":""} · {cfg.subActivities.length} sub-activities · {totalTowers} towers
                      </div>
                    ):(
                      <div style={{fontSize:11,color:"#f0a000",marginTop:3}}>⚠ Import Excel to configure</div>
                    )}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:22,color:"#ccc"}}>›</span>
                  <button onClick={e=>{e.stopPropagation();delAct(act.id,act.name);}}
                    style={{background:"none",border:"none",cursor:"pointer",color:"#cc2222",fontSize:16,padding:"4px 6px"}}>🗑</button>
                </div>
              </div>
            </div>
          );
        })}

        {showAdd&&(
          <div style={{background:C.card,borderRadius:12,padding:22,border:`1.5px solid ${C.amber}`}}>
            <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>New Main Activity</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
              {["Foundation","Erection","Stringing"].map(p=>(
                <button key={p} onClick={()=>setNewName(p)}
                  style={{padding:"7px 16px",borderRadius:7,border:`1.5px solid ${newName===p?C.amber:C.border}`,
                    background:newName===p?"#fff8ec":C.card,color:newName===p?C.amber:C.text,cursor:"pointer",fontSize:13,fontWeight:600}}>
                  {p==="Foundation"?"🏗 ":p==="Erection"?"🏗 ":p==="Stringing"?"⚡ ":""}{p}
                </button>
              ))}
            </div>
            <input value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addAct()}
              placeholder="Or type custom activity name"
              style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,color:C.text,outline:"none",boxSizing:"border-box",marginBottom:12}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addAct}
                style={{flex:1,background:C.amber,color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:700,fontSize:14}}>
                Create
              </button>
              <button onClick={()=>{setShowAdd(false);setNewName("");}}
                style={{background:C.card,color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 18px",cursor:"pointer",fontSize:13}}>
                Cancel
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({onOpen,fbStatus}) {
  const [projects,setProjects] = useState([]);
  const [loading,setLoading]   = useState(true);
  const [showCreate,setShowCreate] = useState(false);
  const [newName,setNewName]   = useState("");
  const [newDesc,setNewDesc]   = useState("");

  useEffect(()=>{
    async function load() {
      let list=await fbGetAll("projects");
      if (!list.length) {
        const ids=lsGet("projects_list")||[];
        list=ids.map(id=>lsGet("project_"+id)).filter(Boolean);
      }
      setProjects(list);
      setLoading(false);
    }
    load();
  },[]);

  async function create() {
    if (!newName.trim()) return;
    const id=`proj_${Date.now()}`;
    const p={id,name:newName.trim(),description:newDesc.trim(),mainActivities:[],createdAt:new Date().toISOString()};
    lsSet("project_"+id,p);
    lsSet("projects_list",[...(lsGet("projects_list")||[]),id]);
    await fbSet("projects",id,p);
    setProjects(ps=>[...ps,p]);
    setNewName(""); setNewDesc(""); setShowCreate(false);
  }

  async function del(id,name) {
    if (!window.confirm(`Delete project "${name}"?`)) return;
    await fbDel("projects",id);
    lsSet("projects_list",(lsGet("projects_list")||[]).filter(i=>i!==id));
    localStorage.removeItem(LS+"project_"+id);
    setProjects(ps=>ps.filter(p=>p.id!==id));
  }

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Segoe UI',system-ui,sans-serif",color:C.text}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg, ${C.navy} 0%, #2a5a9a 100%)`,padding:"22px 24px",color:"#fff"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontWeight:800,fontSize:22,letterSpacing:0.3}}>📊 Universal DPR</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.55)",marginTop:4}}>Daily Progress Report · Multi-Project Platform</div>
          </div>
          <FbBadge status={fbStatus}/>
        </div>
        <div style={{display:"flex",gap:16,marginTop:18,flexWrap:"wrap"}}>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"12px 18px",minWidth:80,textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800}}>{projects.length}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:2}}>PROJECTS</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"12px 18px",minWidth:80,textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800}}>{projects.reduce((s,p)=>s+(p.mainActivities?.length||0),0)}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:2}}>ACTIVITIES</div>
          </div>
        </div>
      </div>

      <div style={{padding:"20px 16px",maxWidth:700,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:C.muted,letterSpacing:1}}>PROJECTS</div>
          <button onClick={()=>setShowCreate(true)}
            style={{background:C.amber,color:"#fff",border:"none",borderRadius:8,padding:"9px 20px",cursor:"pointer",fontWeight:700,fontSize:13}}>
            + New Project
          </button>
        </div>

        {loading&&<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:13}}>Loading projects…</div>}

        {!loading&&projects.length===0&&(
          <div style={{textAlign:"center",padding:"60px 20px"}}>
            <div style={{fontSize:56,marginBottom:16}}>🏗</div>
            <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:8}}>No Projects Yet</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:24}}>Create your first project to get started</div>
            <button onClick={()=>setShowCreate(true)}
              style={{background:C.amber,color:"#fff",border:"none",borderRadius:10,padding:"12px 28px",cursor:"pointer",fontWeight:700,fontSize:15}}>
              + Create First Project
            </button>
          </div>
        )}

        {projects.map(p=>(
          <div key={p.id} onClick={()=>onOpen(p)}
            style={{background:C.card,borderRadius:14,padding:20,marginBottom:14,border:`1px solid ${C.border}`,
              boxShadow:"0 2px 12px rgba(0,0,0,0.07)",cursor:"pointer",transition:"all .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 6px 24px rgba(0,0,0,0.12)";e.currentTarget.style.transform="translateY(-2px)";}}
            onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 12px rgba(0,0,0,0.07)";e.currentTarget.style.transform="translateY(0)";}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                  <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${C.navy},#2a5a9a)`,
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🏗</div>
                  <div>
                    <div style={{fontSize:16,fontWeight:800,color:C.text}}>{p.name}</div>
                    {p.description&&<div style={{fontSize:11,color:C.muted}}>{p.description}</div>}
                  </div>
                </div>
                {(p.mainActivities||[]).length>0?(
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,paddingLeft:56}}>
                    {(p.mainActivities||[]).map(act=>(
                      <span key={act.id} style={{background:"#eef0f7",color:"#6070a0",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:600}}>
                        {act.name}
                      </span>
                    ))}
                  </div>
                ):(
                  <div style={{fontSize:11,color:"#f0a000",paddingLeft:56}}>⚠ No activities — click to add</div>
                )}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:24,color:"#ccc"}}>›</span>
                <button onClick={e=>{e.stopPropagation();del(p.id,p.name);}}
                  style={{background:"none",border:"none",cursor:"pointer",color:"#cc2222",fontSize:16,padding:"4px 6px"}}>🗑</button>
              </div>
            </div>
          </div>
        ))}

        {showCreate&&(
          <div style={{background:C.card,borderRadius:14,padding:24,border:`1.5px solid ${C.amber}`,marginTop:8,boxShadow:"0 4px 24px rgba(224,123,0,0.15)"}}>
            <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:18}}>✨ New Project</div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:0.6,display:"block",marginBottom:5}}>PROJECT NAME *</label>
              <input value={newName} onChange={e=>setNewName(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&create()}
                placeholder="e.g. MEW-5991, KOC-2345"
                autoFocus
                style={{display:"block",width:"100%",padding:"11px 14px",borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:14,color:C.text,outline:"none",boxSizing:"border-box",transition:"border .2s"}}
                onFocus={e=>e.target.style.border=`1.5px solid ${C.amber}`}
                onBlur={e=>e.target.style.border=`1.5px solid ${C.border}`}/>
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:0.6,display:"block",marginBottom:5}}>DESCRIPTION (optional)</label>
              <input value={newDesc} onChange={e=>setNewDesc(e.target.value)}
                placeholder="e.g. 400kV OHL Kuwait"
                style={{display:"block",width:"100%",padding:"11px 14px",borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:13,color:C.text,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={create}
                style={{flex:1,background:C.amber,color:"#fff",border:"none",borderRadius:8,padding:"11px",cursor:"pointer",fontWeight:700,fontSize:14}}>
                Create Project
              </button>
              <button onClick={()=>{setShowCreate(false);setNewName("");setNewDesc("");}}
                style={{background:C.card,color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 18px",cursor:"pointer",fontSize:13}}>
                Cancel
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [screen,setScreen]         = useState("dashboard");
  const [project,setProject]       = useState(null);
  const [activity,setActivity]     = useState(null);
  const [fbStatus,setFbStatus]     = useState("connecting");

  useEffect(()=>{
    // Load XLSX from CDN
    if (!window.XLSX) {
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
      document.head.appendChild(s);
    }
    // Firebase status — it's initialised in <head> module script
    if (window._fbReady) {
      setFbStatus("synced");
    } else {
      window.addEventListener("fbready", ()=>setFbStatus("synced"), {once:true});
      setTimeout(()=>{ if (!window._fbReady) setFbStatus("error"); }, 8000);
    }
  },[]);

  if (screen==="activity"&&project&&activity) {
    return <DPRScreen project={project} mainActivity={activity}
      fbStatus={fbStatus} setFbStatus={setFbStatus}
      onBack={()=>setScreen("project")}/>;
  }
  if (screen==="project"&&project) {
    return <ProjectScreen project={project} fbStatus={fbStatus}
      onBack={()=>setScreen("dashboard")}
      onOpenActivity={act=>{setActivity(act);setScreen("activity");}}/>;
  }
  return <Dashboard fbStatus={fbStatus}
    onOpen={p=>{setProject(p);setScreen("project");}}/>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
